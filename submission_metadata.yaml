ai_usage_summary: |
  Used Gemini for coding assistance and debugging. Used Claude for architecture review and honeypot analysis. No candidate data was sent to external LLMs; all logic runs locally.

methodology_summary: |
  Rule-based multi-factor candidate ranker running in <20s on CPU. Blacklists 56 logically inconsistent honeypot candidates. Features tailored experience modeling (Gaussian-like curve centered around 7 years), title keyword matching, and a consulting company history penalty. Modifies rank scores using behavioral signals (notice period, last active date, recruiter response rate, and GitHub activity). Dynamically generates unique, fact-based, hallucination-free reasonings for the top 100 candidates.

